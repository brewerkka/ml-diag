name: CI

# Continuous integration: lint, type-check, smoke-test the library on every
# push and pull_request. Three Python versions covered to spot 3.10→3.12
# regressions. The fixture corpus is generated synthetically inside the
# smoke tests, so no large data downloads are required for CI.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Lint + tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check src/ tests/ scripts/ --output-format=github
        continue-on-error: true

      - name: Type-check with mypy (best-effort)
        run: |
          pip install mypy
          mypy --ignore-missing-imports src/structured_diag/ || true
        continue-on-error: true

      - name: Run smoke tests
        run: |
          pip install pytest
          pytest tests/ -v --tb=short
