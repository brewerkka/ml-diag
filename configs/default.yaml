
project:
  name: ml_diag
  version: 0.1.0

corpus:
  path: null

  manifest_filename: corpus.manifest.json

  run_meta_filename: meta.json
  run_history_filename: history.csv

partition:
  core_severities: ["moderate", "severe"]
  extended_severities: ["mild"]

  require_single_label_for_core: true

  min_history_epochs: 5

  near_saturated_datasets: []

logging:
  level: INFO
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"

paths:
  results_dir: results
  partition_subdir: partition
